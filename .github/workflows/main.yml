name: Deploy Streamlit app to GitHub Pages

on:
  push:
    branches:
      - master  # O main si estás usando la rama principal por defecto

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version:  ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Streamlit GitHub Pages Adapter
        run: |
          pip install streamlit
#          pip install streamlit-pages-adapter

      - name: Deploy to GitHub Pages
        run: |
#          cd  ~/.github/
          echo "[server]\nheadless = true\nport = 8501\nenableCORS = false\n\n[browser]\ngatherUsageStats = false" > ~/.streamlit/config.toml
          streamlit run app.py &
          sleep 15
          streamlit-pages-adapter --path public --url http://localhost:8501
          git add public/
          git commit -m "Deploy Streamlit app to GitHub Pages"
          git push origin `git subtree split --prefix public master`:gh-pages --force
